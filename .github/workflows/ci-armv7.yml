# SPDX-License-Identifier: ISC
name: ARMv7 Cross CI

on:
  pull_request:
  workflow_dispatch:

# Not triggered on push:main to avoid polluting main-branch status until the
# job has been observed green a few times. Enable main later once stable.

# Cancel any in-progress run of THIS workflow on the SAME ref when a new run
# starts. Small project: only the most recent commit matters. ARM64 CI runs
# in a separate group so both workflows can run concurrently on the same PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: "armv7-eabihf | gcc-15 | Release | cross"
    runs-on: ubuntu-24.04
    env:
      DEBIAN_FRONTEND: noninteractive
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      # Bleeding-edge 2025.08-1 ships gcc 15.1.0 + glibc 2.41 + binutils 2.44.
      # gnuradio4 requires gcc 15+ for C++23 <print> and other libstdc++14+ features;
      # the older stable-2024.05-1 (gcc 13.3, libstdc++ 13) lacks <print>.
      TOOLCHAIN_URL: "https://toolchains.bootlin.com/downloads/releases/toolchains/armv7-eabihf/tarballs/armv7-eabihf--glibc--bleeding-edge-2025.08-1.tar.xz"
      # Official sha256 from bootlin: armv7-eabihf--glibc--bleeding-edge-2025.08-1.sha256
      TOOLCHAIN_SHA256: "eed0e672d305ac08d444685b48eafb291c63387ef7916c1615354ebfb3d1ebdc"
      TOOLCHAIN_ROOT: ${{ github.workspace }}/toolchains/armv7-bootlin/armv7-eabihf--glibc--bleeding-edge-2025.08-1
      ARMV7_TOOLCHAIN_ROOT: ${{ github.workspace }}/toolchains/armv7-bootlin/armv7-eabihf--glibc--bleeding-edge-2025.08-1
      SOAPY_SDR_VERSION: "0.8.1"

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false
          fetch-depth: 0

      - name: Fetch submodules
        run: git submodule update --init --recursive

      - name: Install host dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build ccache \
            ca-certificates curl xz-utils

      - name: Cache Bootlin toolchain (with SoapySDR installed into sysroot)
        id: cache-toolchain
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/toolchains/armv7-bootlin
          key: bootlin-armv7-eabihf-glibc-bleeding-edge-2025.08-1-soapy${{ env.SOAPY_SDR_VERSION }}-xz

      - name: Download Bootlin toolchain
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p "${{ github.workspace }}/toolchains/armv7-bootlin"
          cd "${{ github.workspace }}/toolchains/armv7-bootlin"
          curl -fsSL -o toolchain.tar.xz "$TOOLCHAIN_URL"
          echo "Downloaded toolchain:"
          ls -lh toolchain.tar.xz
          echo "Computed sha256:"
          sha256sum toolchain.tar.xz
          echo "$TOOLCHAIN_SHA256  toolchain.tar.xz" | sha256sum -c -
          tar xf toolchain.tar.xz
          rm toolchain.tar.xz
          ls -la

      - name: Verify toolchain is executable
        run: |
          set -euo pipefail
          "$TOOLCHAIN_ROOT/bin/arm-buildroot-linux-gnueabihf-gcc" --version
          "$TOOLCHAIN_ROOT/bin/arm-buildroot-linux-gnueabihf-g++" --version

      - name: Cross-build SoapySDR into toolchain sysroot
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          SYSROOT="$TOOLCHAIN_ROOT/arm-buildroot-linux-gnueabihf/sysroot"
          mkdir -p soapy-src
          curl -fsSL -o soapy.tar.gz \
            "https://github.com/pothosware/SoapySDR/archive/refs/tags/soapy-sdr-${SOAPY_SDR_VERSION}.tar.gz"
          tar -xf soapy.tar.gz -C soapy-src --strip-components=1
          rm soapy.tar.gz
          cmake -S soapy-src -B soapy-build -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="${GITHUB_WORKSPACE}/cmake/toolchain-armv7-bootlin.cmake" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${SYSROOT}/usr" \
            -DENABLE_PYTHON=OFF \
            -DENABLE_PYTHON3=OFF \
            -DENABLE_TESTS=OFF \
            -DENABLE_DOCS=OFF \
            -DENABLE_APPS=OFF \
            -DENABLE_LIBRARY=ON
          cmake --build soapy-build -j2
          cmake --install soapy-build
          echo "--- SoapySDR install verification ---"
          ls -la "${SYSROOT}/usr/lib/libSoapySDR."*
          ls -la "${SYSROOT}/usr/lib/cmake/SoapySDR/"
          "$TOOLCHAIN_ROOT/bin/arm-buildroot-linux-gnueabihf-readelf" -h \
            "${SYSROOT}/usr/lib/libSoapySDR.so" | head -20
          rm -rf soapy-src soapy-build

      - name: Verify SoapySDR in sysroot (after cache restore or fresh build)
        run: |
          set -euo pipefail
          SYSROOT="$TOOLCHAIN_ROOT/arm-buildroot-linux-gnueabihf/sysroot"
          test -f "${SYSROOT}/usr/lib/libSoapySDR.so" \
            || { echo "ERROR: libSoapySDR.so missing from sysroot"; exit 1; }
          test -f "${SYSROOT}/usr/lib/cmake/SoapySDR/SoapySDRConfig.cmake" \
            || { echo "ERROR: SoapySDR CMake config missing"; exit 1; }
          echo "SoapySDR ${SOAPY_SDR_VERSION} present in sysroot"

      - name: Restore ccache
        id: restore-ccache
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-armv7-gcc15-soapy${{ env.SOAPY_SDR_VERSION }}-Release-${{ github.run_id }}
          restore-keys: ccache-armv7-gcc15-soapy${{ env.SOAPY_SDR_VERSION }}-Release

      - name: Configure ccache
        run: |
          ccache --max-size=3G
          ccache --set-config=compression=true
          ccache --set-config=compression_level=6
          ccache --set-config=depend_mode=true
          ccache --set-config=hash_dir=false
          ccache --set-config=sloppiness=file_macro,time_macros,include_file_mtime,include_file_ctime
          ccache -z

      - name: Configure CMake (cross)
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=cmake/toolchain-armv7-bootlin.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_LORA_APPS=OFF \
            -DENABLE_LORA_BENCHMARKS=OFF \
            -DWARNINGS_AS_ERRORS=OFF \
            -DUSE_CCACHE=ON \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DGR_ENABLE_BLOCK_REGISTRY=OFF \
            -DINTERNAL_ENABLE_BLOCK_PLUGINS=OFF \
            -DGR_ENABLE_HTTP=OFF

      - name: Build gr-lora shared block library
        run: |
          cmake --build build -j2 --target GrLoraBlocksShared || true
          # If GrLoraBlocksShared fails we still want downstream test targets to be
          # attempted individually so the failure log enumerates every portability
          # issue at once. Note: gr_add_block_library(GrLoraBlocks ...) generates
          # GrLoraBlocksObject + GrLoraBlocksShared targets — there is no plain
          # 'GrLoraBlocks' target.

      - name: Build test binaries (portability validation)
        run: |
          cmake --build build -j2 --target \
            qa_lora_algorithms qa_lora_tx qa_lora_phase3 \
            qa_lora_rx qa_lora_loopback qa_lora_burst \
            qa_lora_splitter qa_lora_cad qa_lora_multisf \
            qa_lora_cbor qa_lora_framesink qa_lora_scan \
            qa_lora_wideband qa_lora_tx_queue qa_lora_udp \
            qa_lora_dc_blocker qa_lora_config

      # Note: qa_soapy_loopback excluded — SoapySDR is a host-arch dependency
      # not present in the Bootlin sysroot. Would require cross-building
      # SoapySDR to include it, which is out of scope for this CI.

      # Note: test execution deferred — build-only validation is the goal of this
      # workflow. Running qa_lora_* under qemu-user would be a follow-up task.

      - name: Stage hardware-testable artifact
        if: always()
        run: |
          set -euo pipefail
          STAGE="${{ github.workspace }}/artifact-stage"
          mkdir -p "$STAGE/bin" "$STAGE/lib"
          # Collect every qa_lora_* test binary that successfully built.
          find build -type f -name 'qa_lora_*' -not -name '*.o' -not -name '*.cmake' \
            -executable -print0 2>/dev/null | xargs -0 -I{} cp -v {} "$STAGE/bin/" || true
          # Collect the gr-lora shared block library if it exists.
          find build -type f \( -name 'libGrLoraBlocksShared.so*' -o -name 'libgnuradio-*.so*' \) \
            -print0 2>/dev/null | xargs -0 -I{} cp -v {} "$STAGE/lib/" || true
          # Toolchain identification + git provenance for the receiver.
          {
            echo "git_sha=$(git rev-parse HEAD)"
            echo "git_ref=${GITHUB_REF:-unknown}"
            echo "run_id=${GITHUB_RUN_ID:-unknown}"
            echo "toolchain=armv7-eabihf--glibc--bleeding-edge-2025.08-1"
            echo "target=arm-buildroot-linux-gnueabihf (Cortex-A9 NEON hard-float)"
            "$TOOLCHAIN_ROOT/bin/arm-buildroot-linux-gnueabihf-gcc" --version | head -1
          } > "$STAGE/BUILD_INFO.txt"
          echo "=== artifact contents ==="
          ls -la "$STAGE/bin" "$STAGE/lib" 2>/dev/null || true
          cat "$STAGE/BUILD_INFO.txt"
          echo "=== file types (verify ARM) ==="
          for f in "$STAGE/bin"/* "$STAGE/lib"/*; do
            [ -f "$f" ] && file "$f" | head -1
          done

      - name: Upload hardware-testable artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gr4-lora-armv7-eabihf-${{ github.sha }}
          path: artifact-stage/
          if-no-files-found: warn
          retention-days: 14

      - name: Save ccache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-armv7-gcc15-soapy${{ env.SOAPY_SDR_VERSION }}-Release-${{ github.run_id }}

      - name: Show ccache stats
        if: always()
        run: ccache --show-stats
