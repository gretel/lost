# ── On-device decode via libiio (tezuka FISH Ball PlutoSDR) ────────────────

[device]
driver = "iio"                  # IIO block path (IIOSource instead of SoapySource)
uri    = "local:"               # local IIO context (on-device)
clock  = "internal"

[logging]
level = "INFO"

# ── Radio frontend ──────────────────────────────────────────────────────────

[radio_868]
freq              = 869618000
rx_channel        = [0]
rx_antenna        = ["A_BALANCED"]
rx_gain           = 60           # 0-71 dB manual PGA
lo_offset         = 0            # ignored by AD9361 IIO driver
dc_offset_auto    = false        # Pluto has no HW DC correction

# ── Transceiver (lora_trx) ──────────────────────────────────────────────────

[trx]
name      = "Tezuka IIO MeshCore 868 MHz"
radio     = "radio_868"
rate      = 1000000              # 1 MS/s — matches Pluto IIO constraints
enable_tx = false                # RX-only on-device (no TX path yet)
use_aa_filter = true             # half-band FIR anti-alias on narrowband decimate

[trx.transmit]
sf           = 8
bw           = 62500
cr           = 8
sync_word    = 0x12
preamble_len = 16

[trx.receive]
bandwidths = [62500, 125000, 250000]

[[trx.receive.chain]]
label = "promisc"

[trx.network]
udp_listen      = "0.0.0.0"
udp_port        = 5556
status_interval = 10
lbt             = false          # LBT requires TX — disabled in RX-only mode
tx_queue_depth  = 0

# ── Scanner mode (lora_scan) ────────────────────────────────────────────────

[scan]
radio        = "radio_868"
freq_start   = 867000000
freq_stop    = 870000000
l1_rate      = 4000000           # 4 MS/s — IIO local can handle this
master_clock = 8000000           # 2x L1 rate for AD9361 decimation headroom
channel_bw   = 62500

[scan.network]
udp_listen = "0.0.0.0"
udp_port   = 5557

[core]
listen             = "127.0.0.1:5555"
fanout_queue_depth = 10000

[[core.upstream]]
name   = "radio_868"
host   = "10.0.23.149"
port   = 5561
strict = true

[core.aggregator]
window_ms      = 200
max_candidates = 8

[core.decoders]
enabled = ["meshcore", "lorawan", "raw"]

[core.decoders.meshcore]
decrypt          = true
strict_sync_word = true

[core.decoders.lorawan]
decrypt = false

[core.identity]
identity_file     = "data/meshcore/identity.bin"
keys_dir          = "data/meshcore/keys"
channels_dir      = "data/meshcore/channels"
contacts_dir      = "data/meshcore/contacts"
reload_interval_s = 5

[core.storage]
backend               = "duckdb"
db_path               = "data/lora.duckdb"
batch_rows            = 256
batch_ms              = 1000
checkpoint_interval_s = 300
