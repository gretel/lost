# gr4-lora configuration
#
# Shared by lora_trx and lora_scan.  Each binary reads only its own
# mode section ([trx] or [scan]) plus the shared [device], [radio_*],
# [codec_*], and [logging] sections.
#
# ── Section overview ──
#
# [device]        SDR hardware: driver, parameters, clock source
# [logging]       Log level
# [radio_*]       RF frontend: frequency, channels, gains
# [codec_*]       LoRa PHY / TX parameters: sf, bw, cr, sync_word, preamble
# [trx]           Transceiver mode (lora_trx)
# [trx.network]   UDP I/O: listen, port, LBT, TX queue
# [[trx.decode]]  RX decode chains: sync_word, label, block overrides
# [scan]          Scanner mode (lora_scan)
# [meshcore]      MeshCore protocol (Python scripts only)
# [aggregator]    lora_agg.py diversity combiner
#
# Example uses a USRP B210 via UHD.  Adapt [device] for your hardware:
#   LimeSDR:  driver = "lime"    param = ""
#   HackRF:   driver = "hackrf"  param = ""
#   Loopback: driver = "loopback" param = ""
#
# B210/B220 channel mapping (UHD-specific):
#   0 = TRX_A  (TX/RX)    1 = RX_A  (RX only)
#   2 = RX_B   (RX only)  3 = TRX_B (TX/RX)
# TX only on channels 0 and 3.  Both chains share one PLL per direction.

# ── Hardware ─────────────────────────────────────────────────────────────────

[device]
driver = "uhd"                # SoapySDR driver name (required)
param  = "type=b200"          # device filter (optional, driver-specific)
clock  = "external"           # internal, external, gpsdo

[logging]
level = "INFO"

# ── Radio frontends ──────────────────────────────────────────────────────────

[radio_868]
freq       = 869618000
rx_channel = [1, 2]
tx_channel = 0
rx_gain    = 32
tx_gain    = 75
lo_offset         = 62500  # Hz — shifts DC spur out of BW62.5k passband
# dc_offset_auto   = true  # hardware DC offset correction (AD9361)
dc_blocker       = true    # DSP DC blocker (2nd-order Butterworth HP)
dc_blocker_cutoff = 2000   # DC blocker cutoff frequency (Hz)

# [radio_433]
# freq       = 433650000
# rx_channel = [2]
# tx_channel = 3
# rx_gain    = 34
# tx_gain    = 50

# ── PHY codecs (TX parameters) ──────────────────────────────────────────────
# Codec defines TX parameters.  RX is multi-SF (7-12) and multi-CR (auto) —
# only BW and sync_word matter for RX matching.

[codec_meshcore_868]
sf           = 8               # TX spreading factor
bw           = 62500           # TX bandwidth
cr           = 8               # TX coding rate 4/N
sync_word    = 0x12
preamble_len = 8

# [codec_meshcore_433]
# sf           = 11
# bw           = 250000
# cr           = 5
# sync_word    = 0x12
# preamble_len = 8

# ── Transceiver mode (lora_trx) ─────────────────────────────────────────────
#
# RX decode capabilities (automatic):
#   SF:   7-12  (simultaneous, per MultiSfDecoder lane)
#   CR:   4/5 through 4/8  (auto-detected from explicit header)
#   BW:   per decode_bws list (one MultiSfDecoder per BW via Splitter)
#   LDRO: automatic (from symbol duration vs 16ms threshold)
#
# TX uses the codec's sf/cr/bw for transmission.

[trx]
name       = "MeshCore 868 MHz"
radio      = "radio_868"
codec      = "codec_meshcore_868"
rate       = 250000                     # RX/TX sample rate (Hz)
decode_bws = [62500, 125000, 250000]    # RX BWs (one MultiSfDecoder per BW)
# soft_decode = false                   # experimental: soft-decision (LLR) Hamming decode

# Wideband mode: 16 MS/s capture, digital channelization, all SFs on all channels
# When enabled, decode_bws and rate are ignored (uses wideband_rate instead)
wideband             = false
wideband_rate        = 16000000     # wideband sample rate (Hz)
wideband_master_clock = 32000000    # FPGA master clock (Hz)
# decode_sfs         = [7, 8, 9]   # limit SFs for wideband mode (default: all 7-12)

[trx.network]
udp_listen      = "127.0.0.1"
udp_port        = 5556
status_interval = 10
lbt             = true                  # listen-before-talk
lbt_timeout_ms  = 2000
tx_queue_depth  = 8

# Each [[trx.decode]] entry creates one decode chain (SF7-12, all CRs) per BW.
# Required keys: label, sync_word.  Optional: min_snr_db, energy_thresh, max_symbols.

[[trx.decode]]
label      = "meshcore"
sync_word  = 0x12
min_snr_db = -19.0

# Example: also decode Meshtastic (different sync word) on the same radio
# [[trx.decode]]
# label      = "meshtastic"
# sync_word  = 0x2B
# min_snr_db = -15.0

# ── MeshCore protocol (Python scripts) ──────────────────────────────────────

[meshcore]
name        = "DO2THX 📡"
lat         = 53.54513
lon         = 9.94896
flood_scope = "de-hh"

# ── Aggregator (lora_agg.py) ────────────────────────────────────────────────

[aggregator]
upstream  = "127.0.0.1:5556"
listen    = "127.0.0.1:5555"
window_ms = 200

# ── Scanner mode (lora_scan) ────────────────────────────────────────────────
#
# Layer 1: wideband FFT energy scan → candidate channels
# Layer 2: per-channel CAD dwell with multi-SF detection

[scan]
name         = "EU868 scan"
radio        = "radio_868"
freq_start   = 863000000
freq_stop    = 870000000
bws          = [62500, 125000, 250000]  # L2 probe BWs (all three for full coverage)
l1_rate      = 16000000                 # L1 wideband sample rate
master_clock = 32000000                 # FPGA master clock rate
os_factor    = 4                        # oversampling factor
min_ratio    = 8.0                      # CAD detection threshold
settle_ms    = 5                        # PLL settle delay (ms)
streaming    = true                     # streaming pipeline (no retune)
# sweeps     = 0                        # 0 = infinite (default)
# layer1_only = false                   # set true for energy-only mode

# Streaming-mode parameters (ignored when streaming = false)
buffer_ms     = 512                     # IQ ring buffer duration (ms)
l1_fft_size   = 1024                    # FFT bins for L1 energy
l1_accumulate = 64                      # FFTs to average per energy report
l1_reports    = 64                      # energy reports before probing
channel_bw    = 62500                   # L1 channel grid spacing (Hz)

[scan.network]
udp_listen = "127.0.0.1"
udp_port   = 5557                       # separate from lora_trx (5556)
