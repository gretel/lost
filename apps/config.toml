# lora_trx configuration
#
# [codec_*]   LoRa PHY parameters and block property overrides
# [radio_*]   RF frontend: frequency, channels, gains
# [set_*]     binds a codec to a radio
# [meshcore]  MeshCore protocol settings
# [logging]   Python script log configuration
#
# The first [set_*] (by file order) is used at runtime.
# CR is the denominator (5–8) of the LoRa coding rate 4/N.
#
# Block property overrides (FrameSync, DemodDecoder, DiversityCombiner)
# go flat in the codec section. Each block applies only the keys it
# recognises and silently ignores the rest.
#
# B210/B220 channel mapping:
#   0 = TRX_A  (TX/RX)    1 = RX_A  (RX only)
#   2 = RX_B   (RX only)  3 = TRX_B (TX/RX)
# TX only on channels 0 and 3.  Both chains share one PLL per direction.

# TODO: add "device" block
device = "uhd"
param = "type=b200"
rate = 250000
# internal, external, gpsdo
clock = "external"

# TODO: add "network" block
udp_listen = "127.0.0.1"
udp_port = 5555
status_interval = 10

[meshcore]
region_scope = "de-nord"
# port         = 7834                              # TCP listen port (avoid 5000 on macOS)
# name         = "gr4-lora"                        # node display name
# identity_file = "~/.config/gr4-lora/identity.bin"
# keys_dir     = "~/.config/gr4-lora/keys"
# channels_dir = "~/.config/gr4-lora/channels"
# contacts_dir = "~/.config/gr4-lora/contacts"
# lat          = 53.55                             # latitude  (decimal degrees)
# lon          = 9.99                              # longitude (decimal degrees)

[logging]
level = "INFO"

[codec_meshcore_868]
sf = 8
bw = 62500
cr = 8
sync_word = 0x12
preamble_len = 8
# min_snr_db = -12.0
# energy_thresh = 1e-6
# max_symbols = 256
# ldro_mode = 2
# impl_head = false
# impl_cr = 4
# impl_pay_len = 0
# impl_has_crc = true
# timeout_symbols = 30

[codec_meshcore_433]
sf = 11
bw = 250000
cr = 5
sync_word = 0x12
preamble_len = 8

[codec_reticulum_868]
sf = 8
bw = 125000
cr = 5
sync_word = 0x12
preamble_len = 8

[radio_868]
freq = 869618000
rx_channel = [1, 2]
tx_channel = 0
rx_gain = 43
tx_gain = 50

[radio_433]
freq = 433650000
rx_channel = [2]
tx_channel = 3
rx_gain = 34
tx_gain = 50

[set_meshcore_868]
name = "MeshCore 868 MHz"
codec = "codec_meshcore_868"
radio = "radio_868"

# Optional: multiple decode chains per radio channel.
# Each [[set_meshcore_868.decode]] entry creates a FrameSync+DemodDecoder
# pair (with a Splitter when >1 entry).  All chains feed one DiversityCombiner.
# If omitted, uses the codec's sf/sync_word.
#
# [[set_meshcore_868.decode]]
# sf = 8
# sync_word = 0x12
# label = "meshcore"

# [[set_meshcore_868.decode]]
# sf = 7
# sync_word = 0x2B
# label = "meshtastic"

# [set_meshcore_433]
# name = "MeshCore 433 MHz"
# codec = "codec_meshcore_433"
# radio = "radio_433"
