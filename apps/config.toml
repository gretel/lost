# ── Ports ────────────────────────────────────────────────────────────────────
#
# UDP:
#   5555  lora-core consumer bus     [core].listen          mon, waterfall,
#                                                            bridge, wav
#                                                            subscribe here
#   5556  lora_trx producer          [trx.network].udp_port lora-core upstream
#   5557  lora_scan producer         [scan.network].udp_port lora-core upstream
# TCP:
#   7834  meshcore-bridge companion  [bridge.meshcore].listen_port
#   7835  serial-bridge              [bridge.serial].listen_port
#
# Consumers (lora mon / waterfall / bridge) default to 127.0.0.1:5555.
# Override with --connect HOST:PORT. lora-core must be running for any
# consumer on 5555 to receive data; without it 5555 is dead.

# ── Hardware ─────────────────────────────────────────────────────────────────

[device]
driver = "uhd"                # SoapySDR driver name (required)
#param  = "type=b200,num_recv_frames=512,recv_frame_size=16360,fpga=usrp_b210_fpga.bin"
param  = "type=b200"
# clock  = "internal"         # options: internal | external | gpsdo
clock  = "external"

[logging]
# level = "INFO"              # options: DEBUG | INFO | WARN | ERROR
level = "INFO"
# color = true

# ── Radio frontends ──────────────────────────────────────────────────────────

[radio_868]
freq       = 869618000        # center frequency (Hz)
rx_channel = [0, 1]           # SoapySDR channel indices (B210: 2 independent RX)
rx_antenna = ["RX2", "RX2"]   # stock B210 FPGA labels (B220 Mini bitstream uses "RXA"/"RXB")
tx_channel = 0                # SoapySDR TX channel index
tx_antenna = "TX/RX"          # stock B210 FPGA label (B220 Mini bitstream uses "TRXA")
rx_gain    = 40
tx_gain    = 73.5             # 97 mW
#tx_gain    = 35.5
# lo_offset      = 0          # Hz, 0 = disabled
lo_offset        = 62500      # shift DC spur out of passband
# dc_offset_auto = true       # hardware DC offset correction

# ── Transceiver mode (lora_trx) ──────────────────────────────────────────────

[trx]
name  = "MeshCore 868 MHz"
radio = "radio_868"
# rate       = 250000         # S/s (baseband sample rate)
# enable_tx  = true           # false = RX-only mode

# TX modulation preset. Used only when transmitting.
[trx.transmit]
sf           = 8
bw           = 62500
cr           = 8              # CR 4/8 (denominator; valid 5..8)
sync_word    = 0x12
# preamble_len   = 16

# RX pipeline. One MultiSfDecoder per bandwidth per radio channel.
[trx.receive]
bandwidths = [62500]                   # single BW matching MeshCore EU; multi-BW [62500,125000,250000] causes cross-BW false locks

# Promiscuous chain: decode any LoRa frame regardless of sync word and
# tag each frame with the observed value.  Agnostic default — captures
# MeshCore, LoRaWAN, and private-net traffic out of the box.  Add a
# `sync_word = 0xXX` line to turn this into a strict filter, or add
# additional [[trx.receive.chain]] entries (e.g. one strict + one
# promiscuous) to run several decoders concurrently.
#
# `label` names the chain for downstream consumers (shown as "chain=…"
# in logs / CBOR `decode_label` field).  Convention: use protocol names
# ("meshcore", "lorawan") for strict-filter chains and a mode name
# ("promisc", "all") for promiscuous chains.
[[trx.receive.chain]]
label = "promisc"
# sync_word = 0x12            # uncomment for strict MeshCore-only filter
# sf        = []              # empty / unset = sweep SF7-12
# sf        = [8]             # pin single SF (lower CPU / latency)
# sf        = [8, 11]         # explicit non-contiguous subset

[trx.network]
# udp_listen      = "127.0.0.1"
# udp_port        = 5556        # lora_trx producer; lora-core subscribes here
# status_interval = 10          # seconds between heartbeats (0 = off)
# lbt             = true
# lbt_timeout_ms  = 2000
# tx_queue_depth  = 8

# ── lora-core daemon (Phase 2G typed schema) ─────────────────────────────────
#
# Strict no-compat: legacy [aggregator] / [meshcore] keys are rejected.
# `lora core` listens on the address below; override at the CLI with
# `--listen HOST:PORT` if needed.

[core]
listen             = "127.0.0.1:5555"
fanout_queue_depth = 10000

[[core.upstream]]
name   = "radio_868"
host   = "127.0.0.1"
port   = 5556
strict = true

[core.aggregator]
window_ms      = 200
max_candidates = 8

[core.decoders]
enabled = ["meshcore", "lorawan", "raw"]

[core.decoders.meshcore]
decrypt          = true
strict_sync_word = true

[core.decoders.lorawan]
decrypt = false

[core.identity]
identity_file     = "data/meshcore/identity.bin"
keys_dir          = "data/meshcore/keys"
channels_dir      = "data/meshcore/channels"
contacts_dir      = "data/meshcore/contacts"
reload_interval_s = 5

[core.storage]
backend               = "duckdb"
db_path               = "data/lora.duckdb"
batch_rows            = 256
batch_ms              = 1000
checkpoint_interval_s = 300

# ── meshcore-bridge ──────────────────────────────────────────────────────────
#
# Identity / advert (name, lat, lon, flood_scope) are NOT in TOML — they live
# in the bridge's CBOR EEPROM (config.cbor) and are mutated via the companion
# protocol (SET_ADVERT_NAME, SET_ADVERT_LATLON, SET_FLOOD_SCOPE).

[bridge.meshcore]
listen_port = 7834
tx_via_core = true
eeprom_path = "data/meshcore/config.cbor"

[bridge.serial]
listen_port = 7835

# ── Scanner mode (lora_scan) ─────────────────────────────────────────────────

[scan]
radio        = "radio_868"
freq_start   = 867000000
freq_stop    = 870000000
bws          = [62500, 125000, 250000]   # multi-BW probe for SF classification via chirp-slope
l1_rate      = 4000000           # 4 MS/s — parity with Pluto; fewer channels = faster sweep
master_clock = 8000000           # 2x L1 rate
# os_factor    = 4
# min_ratio    = 5.0
# settle_ms    = 5
# sweeps       = 0            # 0 = infinite
# buffer_ms    = 512.0
# l1_fft_size  = 4096
# channel_bw   = 62500

[scan.network]
# udp_listen = "127.0.0.1"
# udp_port   = 5557           # lora_scan producer; consumers subscribe here

[startup]
# Services supervised by `lora daemon`. Each entry maps to a `lora`
# subcommand; dot-separated names become the argv path
# (`bridge.meshcore` → `lora bridge meshcore`). Visualisation cmds
# (mon / waterfall / spectrum) and one-shots (tx / hwtest) are
# intentionally not allowed here — they stay foreground.
services = ["core", "bridge.meshcore", "wav"]
