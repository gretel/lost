# lora_trx configuration
#
# [device]      SDR hardware: driver, parameters, sample rate, clock
# [network]     UDP I/O: listen address, port, status, TX queue, LBT
# [aggregator]  lora_agg.py: upstream/listen addresses, combining window
# [codec_*]     LoRa PHY parameters: bw, cr, sync_word, preamble_len
# [radio_*]     RF frontend: frequency, channels, gains
# [set_*]       binds a codec to a radio; REQUIRES [[set_*.decode]] entries
# [meshcore]    MeshCore protocol settings (Python scripts only)
# [logging]     Python script log configuration
#
# The first [set_*] (by file order) is used at runtime.
# CR is the denominator (5-8) of the LoRa coding rate 4/N.
#
# B210/B220 channel mapping:
#   0 = TRX_A  (TX/RX)    1 = RX_A  (RX only)
#   2 = RX_B   (RX only)  3 = TRX_B (TX/RX)
# TX only on channels 0 and 3.  Both chains share one PLL per direction.

[device]
driver = "uhd"
param  = "type=b200"
rate   = 250000
# internal, external, gpsdo
clock  = "external"

[network]
udp_listen      = "127.0.0.1"
udp_port        = 5556          # lora_trx raw port; lora_agg subscribes here
status_interval = 10

# Listen-before-talk: defer TX until CAD detects no channel activity
lbt            = true
lbt_timeout_ms = 2000           # max wait for channel clear before rejecting TX
tx_queue_depth = 8              # max queued TX requests (rejects when full)

[aggregator]
upstream  = "127.0.0.1:5556"   # lora_trx raw port (lora_agg subscribes here)
listen    = "127.0.0.1:5555"   # consumer-facing port served by lora_agg
window_ms = 200                 # diversity combining window (ms)

[meshcore]
# port              = 7834                         # TCP listen port (avoid 5000 on macOS)
name          = "DO2THX 📡"                    # node display name (SET_ADVERT_NAME)
# model             = "lora_trx"                   # device model string in DEVICE_INFO
# identity_file     = "scripts/data/meshcore/identity.bin"
# keys_dir          = "scripts/data/meshcore/keys"
# channels_dir      = "scripts/data/meshcore/channels"
# contacts_dir      = "scripts/data/meshcore/contacts"
lat               = 53.54513                        # latitude  (decimal degrees)
lon               = 9.94896                         # longitude (decimal degrees)
# client_repeat     = 0                            # 0=off, 1=on (only valid at 433/869/918 MHz)
# path_hash_mode    = 0                            # 0-2 (path hash mode for flood TX)
# autoadd_config    = 0                            # bitmask: 0x01=overwrite oldest, 0x02=chat,
#                                                  #   0x04=repeater, 0x08=room, 0x10=sensor
# autoadd_max_hops  = 0                            # 0-64 (max hops for auto-add contacts)
flood_scope       = "de-hh"                        # flood scope (SET_FLOOD_SCOPE)

[logging]
level = "INFO"

# --- PHY codecs ---
# [codec_*] contains PHY-only parameters: bw, cr, sync_word, preamble_len.
# MultiSfDecoder decodes all SFs (7-12) simultaneously — no sf setting needed.
# Block-level overrides (min_snr_db, energy_thresh) belong in [[set_*.decode]].

[codec_meshcore_868]
bw           = 62500
cr           = 8
sync_word    = 0x12
preamble_len = 8

# --- Radio frontends ---

[radio_868]
freq       = 869618000
rx_channel = [1, 2]
tx_channel = 0
rx_gain    = 50
tx_gain    = 78

# --- Active network sets ---
# The first [set_*] by file order is used at runtime.
# [[set_*.decode]] entries are REQUIRED (at least one per [set_*]).
# Each entry creates one MultiSfDecoder + FrameSink chain per radio channel.
# MultiSfDecoder decodes SF7-12 simultaneously.  sync_word and label are required.
# Block-level overrides (min_snr_db, energy_thresh, max_symbols) go here.

[set_meshcore_868]
name  = "MeshCore 868 MHz"
codec = "codec_meshcore_868"
radio = "radio_868"

[[set_meshcore_868.decode]]
label      = "meshcore"
sync_word  = 0x12
min_snr_db = -19.0
# energy_thresh = 1e-6
# max_symbols   = 600

