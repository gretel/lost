# lora_trx configuration
#
# [codec_*]   LoRa PHY parameters and block property overrides
# [radio_*]   RF frontend: frequency, channels, gains
# [set_*]     binds a codec to a radio
# [meshcore]  MeshCore protocol settings
# [logging]   Python script log configuration
#
# The first [set_*] (by file order) is used at runtime.
# CR is the denominator (5–8) of the LoRa coding rate 4/N.
#
# Block property overrides (FrameSync, DemodDecoder, DiversityCombiner)
# go flat in the codec section. Each block applies only the keys it
# recognises and silently ignores the rest.
#
# B210/B220 channel mapping:
#   0 = TRX_A  (TX/RX)    1 = RX_A  (RX only)
#   2 = RX_B   (RX only)  3 = TRX_B (TX/RX)
# TX only on channels 0 and 3.  Both chains share one PLL per direction.

# TODO: add "device" block
device = "uhd"
param = "type=b200"
rate = 250000
# internal, external, gpsdo
clock = "external"

# TODO: add "network" block
udp_listen = "127.0.0.1"
udp_port = 5555
status_interval = 10

[meshcore]
region_scope = "de-hh"
# port              = 7834                         # TCP listen port (avoid 5000 on macOS)
name          = "'DO2THX 📡"                   # node display name
# identity_file     = "scripts/data/meshcore/identity.bin"
# keys_dir          = "scripts/data/meshcore/keys"
# channels_dir      = "scripts/data/meshcore/channels"
# contacts_dir      = "scripts/data/meshcore/contacts"
# lat               = 53.55                        # latitude  (decimal degrees)
# lon               = 9.99                         # longitude (decimal degrees)
# client_repeat     = 0                            # 0=off, 1=on (only valid at 433/869/918 MHz)
# path_hash_mode    = 0                            # 0-2 (path hash mode for flood TX)
# autoadd_config    = 0                            # bitmask: 0x01=overwrite oldest, 0x02=chat,
#                                                  #   0x04=repeater, 0x08=room, 0x10=sensor
# autoadd_max_hops  = 0                            # 0-64 (max hops for auto-add contacts)
flood_scope       = "de-hh"                           # scope name (hashed) or 32 hex chars; empty=off

[logging]
level = "INFO"

[codec_meshcore_868]
sf = 8
bw = 62500
cr = 8
sync_word = 0x12
preamble_len = 8
min_snr_db = -19.0
# energy_thresh = 1e-6
# max_symbols = 256
# ldro_mode = 2
# impl_head = false
# impl_cr = 4
# impl_pay_len = 0
# impl_has_crc = true
# timeout_symbols = 30

[codec_meshcore_433]
sf = 11
bw = 250000
cr = 5
sync_word = 0x12
preamble_len = 8

[codec_reticulum_868]
sf = 8
bw = 125000
cr = 5
sync_word = 0x12
preamble_len = 8

[radio_868]
freq = 869618000
rx_channel = [1, 2]
tx_channel = 0
rx_gain = 45
tx_gain = 50

[radio_433]
freq = 433650000
rx_channel = [2]
tx_channel = 3
rx_gain = 34
tx_gain = 50

[set_meshcore_868]
name = "MeshCore 868 MHz"
codec = "codec_meshcore_868"
radio = "radio_868"

# Optional: multiple decode chains per radio channel.
# Each [[set_meshcore_868.decode]] entry creates a FrameSync+DemodDecoder
# pair (with a Splitter when >1 entry).  All chains feed one DiversityCombiner.
# If omitted, uses the codec's sf/sync_word.
#
# [[set_meshcore_868.decode]]
# sf = 8
# sync_word = 0x12
# label = "meshcore"

# [[set_meshcore_868.decode]]
# sf = 7
# sync_word = 0x2B
# label = "meshtastic"

# [set_meshcore_433]
# name = "MeshCore 433 MHz"
# codec = "codec_meshcore_433"
# radio = "radio_433"
