# gr4-lora configuration
#
# Shared by lora_trx and lora_scan.  Each binary reads only its own
# mode section ([trx] or [scan]) plus the shared [device], [radio_*],
# [codec_*], and [logging] sections.
#
# ── Section overview ──
#
# [device]        SDR hardware: driver, parameters, clock source
# [logging]       Log level
# [radio_*]       RF frontend: frequency, channels, gains, DC mitigation
# [codec_*]       LoRa PHY / TX parameters: sf, bw, cr, sync_word, preamble
# [trx]           Transceiver mode (lora_trx)
# [trx.network]   UDP I/O: listen, port, LBT, TX queue
# [[trx.decode]]  RX decode chains: sync_word, label, block overrides
# [scan]          Scanner mode (lora_scan)
# [meshcore]      MeshCore protocol (Python scripts only)
# [aggregator]    lora_agg.py diversity combiner
#
# Values shown are the compiled-in defaults.  Uncomment and change to
# override.  Commented-out lines document available settings and their
# defaults.
#
# Example uses a USRP B210 via UHD.  Adapt [device] for your hardware:
#   LimeSDR:  driver = "lime"    param = ""
#   HackRF:   driver = "hackrf"  param = ""
#   Loopback: driver = "loopback" param = ""
#
# B210/B220 channel mapping (UHD-specific):
#   0 = TRX_A  (TX/RX)    1 = RX_A  (RX only)
#   2 = RX_B   (RX only)  3 = TRX_B (TX/RX)
# TX only on channels 0 and 3.  Both chains share one PLL per direction.

# ── Hardware ─────────────────────────────────────────────────────────────────

[device]
driver = "uhd"                # SoapySDR driver name (required)
param  = "type=b200,num_recv_frames=512,recv_frame_size=16360"
clock  = "external"           # internal | external | gpsdo

[logging]
level = "INFO"                # DEBUG | INFO | WARN | ERROR

# ── Radio frontends ──────────────────────────────────────────────────────────

[radio_868]
freq       = 869618000        # center frequency (Hz)
rx_channel = [1, 2]           # SoapySDR RX channel indices (default: [0])
tx_channel = 0                # SoapySDR TX channel index (default: 0)
# rx_gain    = 35             # RX gain (dB, default: 35)
# tx_gain    = 70             # TX gain (dB, default: 70)
lo_offset         = 62500     # LO offset (Hz, default: 0) — shifts DC spur out of passband
# dc_offset_auto    = true    # hardware DC offset correction (default: true)
# dc_blocker        = true    # DSP DC blocker (default: true)
# dc_blocker_cutoff = 2000    # DC blocker cutoff (Hz, default: 2000)
# frequency_correction = 0.0  # oscillator PPM correction (default: 0, upstream key)
# iq_balance         = []     # manual IQ balance per-channel [I0,Q0,I1,Q1,...] (upstream key)

# [radio_433]
# freq       = 433650000
# rx_channel = [2]
# tx_channel = 3
# rx_gain    = 34
# tx_gain    = 50

# ── PHY codecs (TX parameters) ──────────────────────────────────────────────
# Codec defines TX parameters.  RX is multi-SF (7-12) and multi-CR (auto) —
# only BW and sync_word matter for RX matching.

[codec_meshcore_868]
sf           = 8               # TX spreading factor (default: 8)
bw           = 62500           # TX bandwidth (default: 62500)
cr           = 8               # TX coding rate 4/N (default: 8, meaning CR4/8)
sync_word    = 0x12            # default: 0x12
preamble_len = 8               # default: 8

# [codec_meshcore_433]
# sf           = 11
# bw           = 250000
# cr           = 5
# sync_word    = 0x12
# preamble_len = 8

# ── Transceiver mode (lora_trx) ─────────────────────────────────────────────
#
# RX decode capabilities (automatic):
#   SF:   7-12  (simultaneous, per MultiSfDecoder lane)
#   CR:   4/5 through 4/8  (auto-detected from explicit header)
#   BW:   per decode_bws list (one MultiSfDecoder per BW via Splitter)
#   LDRO: automatic (from symbol duration vs 16ms threshold)
#
# TX uses the codec's sf/cr/bw for transmission.

[trx]
name       = "MeshCore 868 MHz"
radio      = "radio_868"
codec      = "codec_meshcore_868"
# rate       = 250000                   # sample rate (Hz, default: 250000)
decode_bws = [62500, 125000, 250000]    # RX BWs (one MultiSfDecoder per BW)
# soft_decode = false                   # experimental: soft-decision Hamming (default: false)

# Wideband mode: 16 MS/s capture, digital channelization, all SFs
# wideband             = false          # default: false
# wideband_rate        = 16000000       # wideband sample rate (Hz, default: 16e6)
# wideband_master_clock = 32000000      # FPGA master clock (Hz, default: 32e6)
# decode_sfs           = [7, 8, 9]      # limit SFs for wideband (default: all 7-12)

[trx.network]
# udp_listen      = "127.0.0.1"        # default: 127.0.0.1
# udp_port        = 5556               # default: 5556
# status_interval = 10                 # heartbeat interval (s, default: 10, 0 = off)
# lbt             = true               # listen-before-talk (default: true)
# lbt_timeout_ms  = 2000               # max LBT wait (ms, default: 2000)
# tx_queue_depth  = 8                  # max queued TX requests (default: 8)

# Each [[trx.decode]] entry creates one decode chain (SF7-12, all CRs) per BW.
# Required: label, sync_word.  Optional: min_snr_db, energy_thresh, max_symbols.

[[trx.decode]]
label      = "meshcore"
sync_word  = 0x12
# min_snr_db = -19.0                   # minimum SNR for decode (dB, default: -19)
# energy_thresh = 1e-6                 # per-symbol energy threshold (default: 1e-6)
# max_symbols = 600                    # max symbols per frame (default: 600)

# Example: also decode Meshtastic (different sync word) on the same radio
# [[trx.decode]]
# label      = "meshtastic"
# sync_word  = 0x2B

# ── MeshCore protocol (Python scripts) ──────────────────────────────────────

[meshcore]
name        = "DO2THX 📡"
lat         = 53.54513
lon         = 9.94896
flood_scope = "de-hh"
# model = ""                           # device model string
# identity_file = ""                   # Ed25519 identity key path
# port = 7834                          # companion protocol TCP port (default: 7834)
# region_scope = ""                    # regional scoped flood scope

# ── Aggregator (lora_agg.py) ────────────────────────────────────────────────

[aggregator]
# upstream  = "127.0.0.1:5556"         # default: 127.0.0.1:5556
# listen    = "127.0.0.1:5555"         # default: 127.0.0.1:5555
# window_ms = 200                      # dedup window (ms, default: 200)

# ── Scanner mode (lora_scan) ────────────────────────────────────────────────
#
# Layer 1: wideband FFT energy scan → candidate channels
# Layer 2: per-channel CAD dwell with multi-SF detection

[scan]
radio        = "radio_868"
freq_start   = 863000000               # scan band start (Hz)
freq_stop    = 870000000               # scan band stop (Hz)
# bws          = [62500, 125000, 250000]  # L2 probe BWs (default: all three)
# l1_rate      = 16000000              # L1 wideband sample rate (Hz, default: 16e6)
# master_clock = 32000000              # FPGA master clock (Hz, default: 32e6)
# os_factor    = 4                     # oversampling factor (default: 4)
# min_ratio    = 5.0                   # CAD detection threshold (default: 5.0)
# settle_ms    = 5                     # PLL settle delay (ms, default: 5)
# streaming    = true                  # streaming pipeline, no retune (default: true)
# sweeps       = 0                     # 0 = infinite (default: 0)
# layer1_only  = false                 # energy-only mode (default: false)
# buffer_ms    = 512                   # IQ ring buffer (ms, default: 512)
# l1_fft_size  = 4096                  # FFT bins for L1 energy (default: 4096)
# channel_bw   = 62500                 # L1 channel grid spacing (Hz, default: 62500)

[scan.network]
# udp_listen = "127.0.0.1"             # default: 127.0.0.1
# udp_port   = 5557                    # default: 5557
