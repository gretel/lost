# ── Remote PlutoSDR via libiio-over-network ──────────────────────────────────

[device]
driver = "iio"               # IIO block path (IIOSource instead of SoapySource)
param = "uri=ip:10.0.23.149" # <-- change to your Pluto's IP
clock = "internal"

[logging]
level = "INFO"

# ── Radio frontend ──────────────────────────────────────────────────────────

[radio_868]
freq = 869618000
rx_channel = [0]
rx_gain = 60           # 0-71 dB manual PGA
tx_gain = 89           # 0-89 dB
lo_offset = 0          # ignored by AD9361 IIO driver
dc_offset_auto = false # Pluto has no HW DC correction

# ── Transceiver (lora_trx) ──────────────────────────────────────────────────

[trx]
name = "Remote IIO PlutoSDR 868 MHz"
radio = "radio_868"
rate = 2500000                       # 2.5 MS/s — Pluto IIO AD9361 valid rate (40 MHz / 16 = 2.5M)
enable_tx = false                    # RX-only
use_aa_filter = false                 # half-band FIR anti-alias on narrowband decimate

[trx.transmit]
sf = 8
bw = 62500
cr = 8
sync_word = 0x12
preamble_len = 16

[trx.receive]
#bandwidths = [62500, 125000, 250000]
bandwidths = [62500]

[[trx.receive.chain]]
label = "promisc"

[trx.network]
udp_listen = "0.0.0.0"
udp_port = 5556
status_interval = 10
lbt = false            # LBT requires TX — disabled in RX-only mode
tx_queue_depth = 0

# ── Scanner mode (lora_scan) ────────────────────────────────────────────────

[scan]
radio = "radio_868"
freq_start = 867000000
freq_stop = 870000000
l1_rate = 4000000      # 4 MS/s — may need reduction over network
master_clock = 8000000 # 2x L1 rate for AD9361 decimation headroom
channel_bw = 62500

[scan.network]
udp_listen = "0.0.0.0"
udp_port = 5557
