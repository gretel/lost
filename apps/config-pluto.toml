# ── Hardware ─────────────────────────────────────────────────────────────────

[device]
driver = "plutoPAPR"            # gretel/SoapyPlutoPAPR post-rename (was "tezuka")
param  = "uri=ip:10.0.23.159"   # explicit IIO-over-TCP; "" = mDNS (fragile under concurrent enumerate)
clock  = "internal"             # Pluto has no external clock input

[logging]
level = "INFO"

# ── Radio frontend ───────────────────────────────────────────────────────────

[radio_868]
freq              = 869618000    # MeshCore EU primary channel (Hz)
rx_channel        = [0]          # Pluto has a single RX channel
rx_antenna        = ["A_BALANCED"] # Pluto RX antenna (the only valid label)
tx_channel        = 0            # Pluto has a single TX channel
tx_antenna        = "A"          # Pluto TX antenna (the only valid label)
rx_gain           = 60           # 0-71 dB manual PGA; 60 for ambient reception
tx_gain           = 0            # 0-89 dB (0 = min power, safe default)
lo_offset         = 0            # SoapyPlutoPAPR ignores the OFFSET tune arg — the driver
                                 # sets the AD9361 RX_LO directly via iio_channel_attr and has
                                 # no NCO or DSP-level frequency shift. A non-zero value here
                                 # is silently dropped by the driver, so the LO always tunes to
                                 # `freq` and the DC spur lands at baseband center regardless.
                                 # SoapySource's built-in DC blocker (dc_blocker_enabled=true)
                                 # handles the spur for narrowband decode.
                                 # Set to 0 to match reality; UHD config keeps 62500 where the
                                 # UHD driver honours the offset at RF level.
dc_offset_auto    = false        # Pluto does not support HW DC correction

# ── Transceiver (lora_trx) ───────────────────────────────────────────────────

[trx]
name      = "Pluto MeshCore 868 MHz"
radio     = "radio_868"
rate      = 1000000              # 1 MS/s — decode-path constraints below
enable_tx = false                # Pluto only has 1 TX ch; lora_trx hardcodes 2
use_aa_filter = true             # half-band FIR anti-alias on narrowband decimate (SNR gain at os=16)

# Rate selection rationale:
#   - MUST be >= 520 kHz. Below that the AD9361 refuses to stream
#     without an explicit libad9361 FIR filter loaded — SoapyPluto prints
#     "sample rate needs a FIR setting loaded" and no samples flow,
#     which stalls the scheduler (watchdog fires "no progress").
#   - MUST give integer `os = rate / bandwidth` for every BW in
#     [trx.receive].bandwidths. 1 MS/s yields os = 16 / 8 / 4 for
#     BW = 62.5k / 125k / 250k.
#   - MUST NOT exceed Graph::defaultMinBufferSize (65536 cf32) when
#     multiplied by the worst-case `(1 << sf_max) * os`. At 1 MS/s with
#     SF12 sweep and BW = 62.5k, `worst_sps = 4096 * 16 = 65536`
#     (exactly the edge buffer) so the scheduler still runs.
#   - The higher the rate, the more out-of-channel noise aliases into
#     the Nyquist-decimated baseband inside MultiSfDecoder (no FIR in
#     the narrowband decode path today). 1 MS/s is the smallest rate
#     that satisfies the three hard constraints above.
#
# [scan].l1_rate below is independent of this value — the wideband scan
# path keeps its own 4 MS/s capture rate.

[trx.transmit]
sf           = 8
bw           = 62500
cr           = 8                 # CR 4/8
sync_word    = 0x12
preamble_len = 16                # MeshCore RadioLib SX1262::begin() default

[trx.receive]
bandwidths = [62500, 125000, 250000]

[[trx.receive.chain]]
label = "promisc"
# sync_word = 0x12   # uncomment for strict MeshCore-only filter
# sf        = [8]    # single SF (default: sweep SF7-12)

[trx.network]
udp_listen      = "127.0.0.1"
udp_port        = 5556
status_interval = 10
lbt             = true
lbt_timeout_ms  = 2000
tx_queue_depth  = 8

# ── Scanner mode (lora_scan) ─────────────────────────────────────────────────
#
# Narrow scan focused on the MeshCore EU channel. The Pluto can handle
# wider spans (up to ~56 MHz analog LPF), but IIO-over-TCP limits the
# usable L1 rate to the low MS/s; wider scans would tune-hop multiple
# times per full sweep and lengthen the cycle. For A/B testing against
# a Heltec V3 transmitter broadcasting on 869.618 MHz, a 4 MS/s single
# tune point covers the entire MeshCore neighbourhood (~3.5 MHz
# usable after roll-off) in one sweep.

[scan]
radio        = "radio_868"
freq_start   = 867000000
freq_stop    = 870000000
l1_rate      = 4000000           # Pluto IIO-TCP sweet spot; ~1 s per sweep
master_clock = 8000000           # 2x L1 rate for AD9361 decimation headroom
channel_bw   = 62500             # MeshCore narrowband channel width
# bws         = [62500, 125000, 250000]
# os_factor   = 4
# min_ratio   = 5.0
# settle_ms   = 5
# sweeps      = 0                # 0 = infinite
# buffer_ms   = 512.0
# l1_fft_size = 4096

[scan.network]
# udp_listen = "127.0.0.1"
# udp_port   = 5557
